version: '3.8'
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: wts_db
      DB_USER: postgres
      DB_PASSWORD: password
      SESSION_SECRET: change_me_in_production_32chars
      ADMIN_PASSWORD: admin123
      NODE_ENV: production
    depends_on:
      - db
    command: >
      sh -c "sleep 3 && node backend/db/init.js && node backend/server.js"
    volumes:
      - uploads:/app/frontend/public/uploads

volumes:
  pgdata:
  uploads:
